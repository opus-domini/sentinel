# GoReleaser configuration — https://goreleaser.com
# Versioning, the git tag, the GitHub release and the changelog are owned
# by release-please. GoReleaser only builds, packages, signs and uploads
# artifacts onto the release that release-please already created.
version: 2

project_name: sentinel

before:
  hooks:
    # The React SPA is embedded via go:embed; build it before the Go build.
    - npm ci --prefix frontend
    - npm --prefix frontend run build

builds:
  - id: sentinel
    main: ./cmd/sentinel
    binary: sentinel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/opus-domini/sentinel/internal/cli.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: sentinel
    ids:
      - sentinel
    formats:
      - tar.gz
    # install.sh downloads sentinel-<version>-<os>-<arch>.tar.gz and reads the
    # sentinel binary from the archive root; LICENSE/README/CHANGELOG ride
    # along (GoReleaser default) and are harmless to the installer.
    name_template: "sentinel-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "sentinel-{{ .Version }}-checksums.txt"
  algorithm: sha256

# A CycloneDX SBOM (generated by syft) for every release archive.
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signature over the checksums file. The checksums file
# covers every archive and SBOM by SHA-256, so a single signature anchors
# the whole release. The .bundle (signature + certificate + Rekor proof) is
# uploaded alongside the checksums and can be verified independently.
signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  # release-please owns CHANGELOG.md and the GitHub release notes.
  disable: true

release:
  # release-please already created the GitHub Release. Keep release-please notes
  # untouched, but allow reruns to replace already-uploaded assets.
  mode: keep-existing
  replace_existing_artifacts: true
