version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocyclo
    - copyloopvar
    - intrange
    - usestdlibvars
    - gocritic
    - goconst
    - whitespace
    - bodyclose
    - gosec
    - noctx
    - exhaustive
    - misspell
    - nolintlint
  exclusions:
    rules:
      # httptest.NewRequest is the standard Go test pattern; it uses
      # context.Background() internally, so the noctx production-code
      # rule is not meaningful for test fixtures.
      - path: _test\.go
        linters:
          - noctx
          - gosec
  settings:
    goconst:
      # Test files legitimately repeat literals across table-driven cases;
      # extracting constants there hurts readability more than it helps.
      ignore-tests: true
    gosec:
      excludes:
        # PTY implementation requires unsafe.Pointer for ioctl syscalls
        - G103
        # Shell path comes from validated /etc/shells lookup, not user input
        - G204
        # int→uint16 for terminal rows/cols and WS close codes are bounded
        - G115
        # crypto/sha1 is mandated by RFC 6455 (WebSocket handshake)
        - G401
        - G505
        # Auth cookies set HttpOnly, SameSite and a policy-driven Secure flag;
        # gosec's literal heuristic cannot see the dynamic Secure value.
        - G124
        # Long-running services store cancel funcs and call them from Stop/Close.
        - G118
        # Taint-analysis rules produce false positives on structured logging,
        # internal file paths, and httptest clients.
        - G703
        - G704
        - G705
        - G706

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
