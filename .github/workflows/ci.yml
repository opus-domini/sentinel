name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - .github/.release-please-manifest.json
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: opus-domini/actions/.github/workflows/ci.yml@16303d244a8d12248ac8f8d84683b53c5e9c1ee0
    with:
      frontend: true
      upload-codecov: true
