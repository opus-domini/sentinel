name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - .github/.release-please-manifest.json
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: opus-domini/actions/.github/workflows/ci.yml@2a77045ce3f8ac6a7e9ba476cd2a0a6ea5c2b883
    with:
      frontend: true
      upload-codecov: true
