name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - .github/.release-please-manifest.json
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: opus-domini/actions/.github/workflows/ci.yml@b5a8d4143e39e1235287da0185b10fbfbdf5613a
    with:
      frontend: true
      upload-codecov: true
