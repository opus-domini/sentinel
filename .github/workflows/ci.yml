name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - .github/.release-please-manifest.json
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: opus-domini/actions/.github/workflows/ci.yml@17866e559e67dd922c92b62d99f8f4be6e14422e
    with:
      frontend: true
      upload-codecov: true
