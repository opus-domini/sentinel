[tools]
go = "1.26.5"
# Keep npm before node so the pinned npm shim wins over Node's bundled npm.
"npm:npm" = "12.0.1"
node = "26"

# Keep in sync with .github/workflows/ci.yml
golangci-lint = "2.12.2"                          # GOLANGCI_LINT_VERSION
"go:golang.org/x/vuln/cmd/govulncheck" = "1.6.0"  # GOVULNCHECK_VERSION
